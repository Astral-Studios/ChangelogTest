name: Discord Changelog Notification

on:
  push:
    branches:
      - main
    paths:
      - "**/*.md"

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff properly

      - name: Send Discord notification for new changelogs
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python3 << 'PYTHON'
          import subprocess
          import os
          import json
          import urllib.request
          import re

          webhook = os.environ.get("DISCORD_WEBHOOK", "")
          if not webhook:
              print("No webhook URL set.")
              exit(1)

          # Get files added in this push
          result = subprocess.run(
              ["git", "diff", "--name-status", "HEAD~1", "HEAD"],
              capture_output=True, text=True
          )

          new_files = []
          for line in result.stdout.splitlines():
              parts = line.split("\t")
              if len(parts) == 2 and parts[0] == "A" and parts[1].endswith(".md"):
                  new_files.append(parts[1])

          print(f"New .md files: {new_files}")

          if not new_files:
              print("No new markdown files found.")
              exit(0)

          # Color map per server folder
          colors = {
              "acerexfactions": 0x22c55e,
              "cobblecoreskyblock": 0x3b82f6,
          }

          for filepath in new_files:
              with open(filepath, "r") as f:
                  raw = f.read()

              # Parse frontmatter
              fm_match = re.match(r"^---\n(.*?)\n---\n(.*)", raw, re.DOTALL)
              if fm_match:
                  fm_text = fm_match.group(1)
                  body = fm_match.group(2).strip()
              else:
                  fm_text = ""
                  body = raw.strip()

              def get_fm(key):
                  m = re.search(rf"^{key}:\s*(.+)$", fm_text, re.MULTILINE)
                  return m.group(1).strip() if m else ""

              title = get_fm("title") or "New Changelog"
              date = get_fm("date") or ""
              author = get_fm("author") or "Unknown"

              # Server name from folder
              folder = filepath.split("/")[0] if "/" in filepath else "server"
              color = colors.get(folder.lower(), 0x5865F2)

              # Trim body to 1000 chars for Discord
              if len(body) > 1000:
                  body = body[:1000] + "\n..."

              footer_text = f"Posted by {author}"
              if date:
                  footer_text += f" • {date}"

              embed = {
                  "title": f"📋 {title}",
                  "description": f"```md\n{body}\n```",
                  "color": color,
                  "author": {"name": f"{folder.title()} Changelog"},
                  "footer": {"text": footer_text},
              }

              payload = json.dumps({"embeds": [embed]}).encode("utf-8")

              req = urllib.request.Request(
                  webhook,
                  data=payload,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )

              with urllib.request.urlopen(req) as resp:
                  print(f"Discord response: {resp.status} for {filepath}")

          PYTHON
